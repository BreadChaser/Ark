<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Ark</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo">⚓ The Ark</span>
        <button class="icon-btn" id="btn-refresh" title="Refresh tailnet">↻</button>
      </div>
      <div class="sidebar-sub">Tailscale network</div>
      <ul class="conv-list" id="conv-list"></ul>
    </aside>

    <main class="chat">
      <header class="chat-header" id="chat-header">
        <div>
          <h1 id="conv-title">Select a machine</h1>
          <p class="conv-meta" id="conv-meta"></p>
        </div>
        <span class="status-pill" id="conv-status"></span>
      </header>

      <div class="messages" id="messages">
        <div class="empty-state">Pick a conversation on the left — machines auto-populate from your Tailscale tailnet.</div>
      </div>

      <form class="composer" id="composer">
        <input
          type="text"
          id="command-input"
          placeholder="Run a command on this machine… (Enter to send)"
          autocomplete="off"
          disabled
        />
        <button type="submit" id="send-btn" disabled>Run</button>
      </form>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
