<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ark</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand-row">
        <div class="brand">ARK</div>
        <div class="inline-actions">
          <button id="add-session" class="primary" title="Add session">Add</button>
          <button id="sidebar-refresh" class="icon-button" title="Refresh devices">Refresh</button>
        </div>
      </div>
      <div id="devices" class="device-list"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="title">Ark</h1>
          <p id="meta">Loading...</p>
        </div>
        <div class="top-actions">
          <span id="status" class="status-pill">Idle</span>
          <select id="theme" aria-label="Theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="ark">Ark Amber</option>
          </select>
          <button id="refresh">Refresh</button>
        </div>
      </header>

      <section id="error" class="error" hidden></section>

      <div class="workspace">
        <section class="setup-column">
          <section class="project-panel">
            <div class="panel-head">
              <h2>Project</h2>
              <div class="inline-actions">
                <button id="home-dir">Home</button>
                <button id="parent-dir">Up</button>
                <button id="close-add">Close</button>
              </div>
            </div>
            <div class="path-row">
              <input id="repo" placeholder="/path/to/repo on selected device" autocomplete="off" />
              <button id="browse">Go</button>
            </div>
            <div class="open-row">
              <select id="tool" aria-label="Tool">
                <option value="codex">Codex</option>
                <option value="terminal">Terminal</option>
                <option value="opencode">OpenCode</option>
                <option value="claude">Claude</option>
              </select>
              <button id="start" class="primary">Open Codex</button>
            </div>
            <div id="dir-cwd" class="cwd-chip">~</div>
            <div id="dirs" class="dir-list"></div>
          </section>

          <section class="tmux-panel">
            <div class="panel-head">
              <h2>tmux sessions</h2>
              <button id="refresh-tmux">Refresh</button>
            </div>
            <div id="tmux"></div>
          </section>
        </section>

        <section id="session-panel" class="session-panel">
          <div class="session-toolbar">
            <div class="segmented">
              <button id="view-parsed" class="active">Parsed</button>
              <button id="view-raw">Raw</button>
            </div>
            <div class="inline-actions">
              <button id="restart" disabled>Restart</button>
              <button id="resume" disabled>Resume last</button>
              <button id="forget" disabled>Forget</button>
              <button id="kill" disabled>Kill</button>
            </div>
          </div>
          <div id="parsed" class="parsed-output">
            <div class="empty-session">Open a tool for the selected project or attach a tmux session.</div>
          </div>
          <pre id="output" class="terminal-output" hidden>No session selected.</pre>
          <div class="composer">
            <textarea id="input" placeholder="Message or terminal input. Ctrl+Enter sends." disabled></textarea>
            <div class="composer-actions">
              <button id="interrupt" disabled>Ctrl-C</button>
              <button id="send" class="primary" disabled>Send</button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
