# The Ark — shared tmux config (all Linux machines)
# Install: ln -sf ~/Development/ark/config/tmux.conf ~/.tmux.conf

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g mouse on
set -g history-limit 50000

# Prefix: Ctrl-a (easier than Ctrl-b on laptops)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane nav
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Status bar
set -g status-style "bg=#0f172a fg=#94a3b8"
set -g status-left-length 40
set -g status-left "#[fg=#38bdf8,bold]⚓ #[fg=#e2e8f0]#S "
set -g status-right "#[fg=#64748b]%Y-%m-%d %H:%M #[fg=#38bdf8]#h"

setw -g window-status-current-style "fg=#38bdf8,bold"
setw -g window-status-style "fg=#64748b"

# New windows/panes inherit cwd
bind c new-window -c "#{pane_current_path}"
bind C new-session -c "#{pane_current_path}"
